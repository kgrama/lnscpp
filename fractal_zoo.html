<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRACTAL ZOO — PBF Arithmetic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --panel: #111;
    --border: #222;
    --accent: #e8ff3c;
    --accent2: #ff3c6e;
    --text: #d0d0d0;
    --dim: #555;
    --mono: 'Space Mono', monospace;
    --display: 'Bebas Neue', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--panel);
  }

  .logo {
    font-family: var(--display);
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--accent2); }

  .fractal-tabs {
    display: flex;
    gap: 2px;
    flex: 1;
  }

  .tab {
    padding: 6px 14px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .info-badge {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .info-badge strong { color: var(--accent2); }

  /* ── main layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── canvas area ── */
  .canvas-wrap {
    flex: 1;
    position: relative;
    cursor: crosshair;
    background: #000;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .crosshair {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: rgba(232,255,60,0.15);
  }
  .crosshair::before { left: 50%; top: 0; bottom: 0; width: 1px; }
  .crosshair::after  { top: 50%; left: 0; right: 0; height: 1px; }

  .zoom-overlay {
    position: absolute;
    border: 1px solid var(--accent);
    pointer-events: none;
    display: none;
    background: rgba(232,255,60,0.05);
  }

  .coords {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: rgba(8,8,8,0.85);
    padding: 8px 12px;
    border: 1px solid var(--border);
    font-size: 10px;
    line-height: 1.8;
    color: var(--dim);
    pointer-events: none;
  }
  .coords .val { color: var(--accent); }

  .render-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(8,8,8,0.85);
    padding: 6px 10px;
    border: 1px solid var(--border);
    font-size: 10px;
    color: var(--dim);
    pointer-events: none;
  }
  .render-badge.rendering { border-color: var(--accent2); color: var(--accent2); }

  /* ── sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    font-size: 11px;
  }

  .sidebar-section {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-size: 9px;
    color: var(--dim);
    margin-bottom: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .control-row label { color: var(--dim); }
  .control-row .val  { color: var(--accent); font-weight: 700; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    margin: 4px 0 10px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .btn {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.primary:hover { background: var(--accent); color: #000; }

  .format-row {
    display: flex;
    gap: 6px;
  }
  .format-row .btn { margin-bottom: 0; width: 50%; }
  .format-row .btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232, 255, 60, 0.08);
  }

  .color-row {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .swatch {
    flex: 1;
    height: 20px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.1s;
  }
  .swatch.active { border-color: #fff; }

  .stat-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 5px;
    color: var(--dim);
  }
  .stat-row span:last-child { color: var(--text); }

  .julia-params {
    display: flex;
    gap: 6px;
  }
  .julia-params input[type=number] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 4px 6px;
    font-family: var(--mono);
    font-size: 10px;
    outline: none;
    width: 0;
  }
  .julia-params input[type=number]:focus { border-color: var(--accent); }

  .desc {
    font-size: 10px;
    color: var(--dim);
    line-height: 1.6;
    margin-top: 4px;
  }
  .desc strong { color: var(--text); }

  /* scrollbar */
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: var(--panel); }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo">FRACTAL<span>ZOO</span></div>
  <div class="fractal-tabs" id="tabs"></div>
  <div class="info-badge" id="formatBadge">arithmetic: <strong>PBF8 — int mul/div, int Q13 CF for sb/db</strong></div>
</header>

<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gl"></canvas>
    <div class="crosshair"></div>
    <div class="zoom-overlay" id="zoomBox"></div>
    <div class="coords" id="coords">
      <div>Re: <span class="val" id="cRe">0.000000</span></div>
      <div>Im: <span class="val" id="cIm">0.000000</span></div>
      <div>Zoom: <span class="val" id="cZoom">1×</span></div>
    </div>
    <div class="render-badge" id="renderBadge">READY</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Iterations</div>
      <div class="control-row">
        <label>Max iter</label>
        <span class="val" id="iterVal">256</span>
      </div>
      <input type="range" id="iterSlider" min="32" max="1024" value="256" step="32">
    </div>

    <div class="sidebar-section" id="juliaControls" style="display:none">
      <div class="sidebar-label">Julia Seed (c)</div>
      <div class="julia-params">
        <input type="number" id="juliaRe" value="-0.7269" step="0.001" placeholder="Re">
        <input type="number" id="juliaIm" value="0.1889" step="0.001" placeholder="Im">
      </div>
      <button class="btn" id="juliaRand" style="margin-top:8px">Random seed</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Format</div>
      <div class="format-row" id="formats">
        <button class="btn format-btn active" data-fmt="pbf8">PBF8</button>
        <button class="btn format-btn"        data-fmt="pbf16">PBF16</button>
      </div>
      <div class="format-row" style="margin-top:6px">
        <button class="btn format-btn" data-fmt="tap8">TAP-PBF8</button>
        <button class="btn format-btn" data-fmt="tap16">TAP-PBF16</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Palette</div>
      <div class="color-row" id="palettes"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <button class="btn primary" id="btnReset">Reset view</button>
      <button class="btn" id="btnZoomIn">Zoom in 2×</button>
      <button class="btn" id="btnZoomOut">Zoom out 2×</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Stats</div>
      <div class="stat-row"><span>Render</span><span id="statMs">—</span></div>
      <div class="stat-row"><span>Resolution</span><span id="statRes">—</span></div>
      <div class="stat-row"><span>Zoom</span><span id="statZoom">1×</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">About</div>
      <div class="desc" id="fractalDesc"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// PBF CPU-SIDE CONSTANTS (PBF8 and PBF16)
// Mirrors pbf8_init / pbf16_init in pbf.cpp. Values pushed as uniforms.
// ══════════════════════════════════════════════════════════════════════════════

function makePbf(n_bits, v_min, v_max) {
  const mid          = 1 << (n_bits - 1);
  const n_levels     = mid - 1;
  const max_code     = (1 << n_bits) - 1;
  const ln_per_level = Math.log(v_max / v_min) / n_levels;
  const offset       = Math.round(Math.log(v_min) / ln_per_level);
  // Q13 form of ln_per_level — used by the GPU's int CF for sb/db.
  const base_step_log_q13 = Math.max(1, Math.round(ln_per_level * 8192));

  const encode = (v) => {
    if (v === 0) return 0;
    let mag = Math.abs(v);
    if (mag < v_min) mag = v_min;
    if (mag > v_max) mag = v_max;
    let level = Math.round(Math.log(mag / v_min) / ln_per_level);
    if (level < 0) level = 0;
    if (level > n_levels - 1) level = n_levels - 1;
    return v > 0 ? mid + level : mid - 1 - level;
  };

  return {
    n_bits, v_min, v_max, mid, n_levels, max_code,
    ln_per_level, offset, base_step_log_q13,
    is_taper: false,
    pbf_one:   encode(1.0),
    pbf_two:   encode(2.0),
    pbf_three: encode(3.0),
    pbf_four:  encode(4.0),
    encode,
  };
}

const PBF8  = makePbf(8,  1e-4, 1e4);
const PBF16 = makePbf(16, 1e-8, 1e8);

// ── Tapered PBF (mirrors pbf_taper.cpp). 4 tapers with step ratios 8:1:1:8 ──
// — denser around |x|=1.0. W16 boundaries match proofs/P32_Taper.v exactly.
//
// Uses an integer "position" coordinate: each magnitude code takes 1 or 8
// position units depending on its taper. Mul/div on tapered codes is then a
// pure integer add/sub on positions:
//     pos(a*b) = pos(a) + pos(b) − unity_pos
// matching the flat path's `am + bm + offset` shape.
function makeTaperedPbf(n_bits, v_max) {
  const mid       = 1 << (n_bits - 1);
  const max_code  = (1 << n_bits) - 1;
  const max_mag   = mid - 2;

  let taper_mag_end;
  if (n_bits === 16) {
    taper_mag_end = [8191, 16382, 24573, 32766];
  } else {
    const per = (max_mag / 4) | 0;
    taper_mag_end = [per - 1, 2*per - 1, 3*per - 1, max_mag];
  }

  const taper_step = [8, 1, 1, 8];   // base position units per code in each taper

  // Cumulative position at end of each taper. Position 0 = magnitude code 0.
  // Within taper k, each successive code adds taper_step[k] positions.
  const taper_pos_end = [];
  let pos = 0, prev_mag = 0;
  for (let k = 0; k < 4; k++) {
    pos += (taper_mag_end[k] - prev_mag) * taper_step[k];
    taper_pos_end.push(pos);
    prev_mag = taper_mag_end[k];
  }
  const max_pos = taper_pos_end[3];

  // unity_pos = position where log = 0. Total log span = 2*ln(v_max), so unity
  // sits at the geometric centre of position space.
  const unity_pos = max_pos >> 1;

  // Pre-compute per-taper start positions (for fast pos→mag lookup).
  const taper_pos_start = [0];
  for (let k = 1; k < 4; k++) taper_pos_start.push(taper_pos_end[k-1] + taper_step[k]);

  // Q13 fixed-point: matches the GPU CF's Q-format exactly so log values can
  // be passed verbatim to the int sb/db evaluator on the GPU.
  const Q13 = 8192;
  // base_step_log_q13 = log per position unit, in Q13. Used for the sb/db CF
  // input: d_q13 = (pos_diff) * base_step_log_q13.
  const base_step_log_q13 = Math.round(2 * Math.log(v_max) / max_pos * Q13);

  const magToPos = (mag) => {
    const k = mag <= taper_mag_end[0] ? 0
            : mag <= taper_mag_end[1] ? 1
            : mag <= taper_mag_end[2] ? 2 : 3;
    const base_mag = k === 0 ? 0 : taper_mag_end[k-1] + 1;
    const base_pos = k === 0 ? 0 : taper_pos_start[k];
    return base_pos + (mag - base_mag) * taper_step[k];
  };

  const posToMag = (p) => {
    if (p <= 0)        return 0;
    if (p >= max_pos)  return max_mag;
    const k = p <= taper_pos_end[0] ? 0
            : p <= taper_pos_end[1] ? 1
            : p <= taper_pos_end[2] ? 2 : 3;
    const base_mag = k === 0 ? 0 : taper_mag_end[k-1] + 1;
    const base_pos = k === 0 ? 0 : taper_pos_start[k];
    const step = taper_step[k];
    return base_mag + (((p - base_pos) + (step >> 1)) / step | 0);
  };

  const encode = (v) => {
    if (v === 0) return 0;
    let a = Math.abs(v);
    if (a > v_max) a = v_max;
    if (a < 1.0/v_max) a = 1.0/v_max;
    // Position from log: pos = unity_pos + round(log_v / base_step_log)
    const log_q13 = Math.round(Math.log(a) * Q13);
    const p = unity_pos + Math.round(log_q13 / base_step_log_q13);
    const mag = posToMag(p);
    return v > 0 ? mid + mag : mid - 1 - mag;
  };

  return {
    n_bits, v_min: 1.0/v_max, v_max,
    mid, n_levels: max_mag + 1, max_code,
    is_taper: true,
    // Uniform payload (all int)
    taper_mag_end:   new Int32Array(taper_mag_end),
    taper_pos_end:   new Int32Array(taper_pos_end),
    taper_pos_start: new Int32Array(taper_pos_start),
    taper_step:      new Int32Array(taper_step),
    unity_pos, max_pos, base_step_log_q13,
    pbf_one:   encode(1.0),
    pbf_two:   encode(2.0),
    pbf_three: encode(3.0),
    pbf_four:  encode(4.0),
    encode,
    // legacy fields for shader uniforms when flat (zero for tapered)
    ln_per_level: 1.0,
    offset: 0,
  };
}

const TAP8  = makeTaperedPbf(8,  1e4);
const TAP16 = makeTaperedPbf(16, 1e8);

let currentFormat = PBF8;

// ══════════════════════════════════════════════════════════════════════════════
// PBF8 INTEGER ARITHMETIC IN GLSL
// Codes are ints in [0, 255]. Zero → 0, infinity → 255, negatives < 128,
// positives ≥ 128. Multiplication and division are pure integer adds on
// magnitude levels. Addition uses softplus/softminus at the float boundary
// (GPUs lack int64 for the Q32 CF used in pbf.cpp).
// ══════════════════════════════════════════════════════════════════════════════

const PBF_GLSL = `
// ── PBF format parameters (set from JS; PBF8 or PBF16) ──────────────────────
uniform int   PBF_MID;         // 1 << (n_bits - 1)
uniform int   PBF_MAX;         // (1 << n_bits) - 1, infinity sentinel
uniform int   PBF_LEVELS;      // mid - 1
uniform float u_ln_per_level;  // ln(v_max/v_min) / n_levels  (flat path)
uniform float u_vmin;          // (flat path)
uniform int   u_offset;        // precomputed round(ln(v_min) / scale_ln) (flat)
uniform int   u_pbf_one;       // pbf_encode(1.0)
uniform int   u_pbf_two;       // pbf_encode(2.0)
uniform int   u_pbf_three;     // pbf_encode(3.0)

// ── Tapered PBF parameters (used when u_format_kind == 1) ───────────────────
// Position units: each magnitude code costs 1 or 8 base units, depending on
// its taper. unity_pos is the position where log(value) = 0. Mul/div on
// tapered codes is then a pure integer add/sub on positions.
uniform int u_format_kind;        // 0 = flat, 1 = tapered
uniform int u_taper_mag_end[4];   // inclusive end of each taper (mag code units)
uniform int u_taper_pos_end[4];   // cumulative position at end of each taper
uniform int u_taper_pos_start[4]; // first position in each taper (k>0)
uniform int u_taper_step[4];      // base position units per code in this taper
uniform int u_unity_pos;          // position at log = 0
uniform int u_max_pos;            // position at largest magnitude code

// ── Integer Q13 CF state ────────────────────────────────────────────────────
// Q13 is the largest Q-format that fits the muldiv 16*x*Q worst case in
// signed int32 (16 * 2^13 * 2^13 = 2^30 < 2^31). The CPU PBF uses Q32
// (needs int64); Q13 is the GPU equivalent — same algorithm, narrower mantissa.
const int PBF_Q   = 8192;          // 1 << 13
const int PBF_LN2 = 5680;          // round(ln(2) * 8192)

// Q13 log per tapered position unit (used to convert position differences
// into the Q13 d the sb/db CF expects). Set from JS.
uniform int u_base_step_log_q13;

// ── Primitives ──────────────────────────────────────────────────────────────

int pbf_neg(int a) {
    if (a == 0 || a == PBF_MAX) return a;
    return PBF_MAX - a;
}

int pbf_abs(int a) {
    if (a == 0 || a >= PBF_MID) return a;
    return pbf_neg(a);
}

// ── Tapered position helpers (only used when u_format_kind == 1) ────────────

// GLSL ES 1.0 requires constant array indices, so the per-taper branches
// are unrolled. Logic identical to pbf_taper.cpp's piecewise lookup.
int pbft_mag_to_pos(int mag) {
    if (mag <= u_taper_mag_end[0])
        return mag * u_taper_step[0];
    if (mag <= u_taper_mag_end[1])
        return u_taper_pos_start[1] + (mag - u_taper_mag_end[0] - 1) * u_taper_step[1];
    if (mag <= u_taper_mag_end[2])
        return u_taper_pos_start[2] + (mag - u_taper_mag_end[1] - 1) * u_taper_step[2];
    return     u_taper_pos_start[3] + (mag - u_taper_mag_end[2] - 1) * u_taper_step[3];
}

int pbft_pos_to_mag(int p) {
    if (p <= 0)         return 0;
    if (p >= u_max_pos) return PBF_LEVELS - 1;
    if (p <= u_taper_pos_end[0])
        return (p + (u_taper_step[0] / 2)) / u_taper_step[0];
    if (p <= u_taper_pos_end[1])
        return (u_taper_mag_end[0] + 1) + (p - u_taper_pos_start[1]);
    if (p <= u_taper_pos_end[2])
        return (u_taper_mag_end[1] + 1) + (p - u_taper_pos_start[2]);
    return     (u_taper_mag_end[2] + 1)
             + ((p - u_taper_pos_start[3]) + (u_taper_step[3] / 2)) / u_taper_step[3];
}

// ── Integer Q13 continued fractions (mirrors pbf.cpp, narrower mantissa) ────

int pbf_kdiv(int a, int b) {
    if (b == 0) return a;
    int b_half = b / 2;
    int num    = (b > 0) ? (a + b_half) : (a - b_half);
    return num / b;
}

// Round-to-nearest a*b/c. Caller must ensure a*b fits in int32 (true for
// every CF call here: |a*b| ≤ 16*Q*Q = 2^30).
int pbf_muldiv(int a, int b, int c) {
    if (c == 0) return a;
    int prod  = a * b;
    int chalf = (c > 0) ? (c / 2) : -((-c) / 2);
    int num   = (c > 0) ? (prod + chalf) : (prod - chalf);
    return num / c;
}

// ln(1 + x/Q) * Q via 8-term continued fraction.
int pbf_ln1p_cf(int x) {
    if (x == 0)        return 0;
    if (x <= -PBF_Q)   return -PBF_Q * 100;
    int h = 8 * PBF_Q;
    h = 7 * PBF_Q + pbf_muldiv(16 * x, PBF_Q, h);
    h = 6 * PBF_Q + pbf_muldiv( 9 * x, PBF_Q, h);
    h = 5 * PBF_Q + pbf_muldiv( 9 * x, PBF_Q, h);
    h = 4 * PBF_Q + pbf_muldiv( 4 * x, PBF_Q, h);
    h = 3 * PBF_Q + pbf_muldiv( 4 * x, PBF_Q, h);
    h = 2 * PBF_Q + pbf_muldiv(     x, PBF_Q, h);
    h = 1 * PBF_Q + pbf_muldiv(     x, PBF_Q, h);
    return pbf_muldiv(x, PBF_Q, h);
}

// (exp(x/Q) - 1) * Q via 7-term continued fraction.
int pbf_expm1_cf(int x) {
    if (x == 0) return 0;
    if (x >  10 * PBF_Q) return PBF_Q * 16384;     // saturate; PBF_Q*1<<20 overflows int32
    if (x < -10 * PBF_Q) return -PBF_Q;
    int h = 2 * PBF_Q;
    h = 7 * PBF_Q + pbf_muldiv(-x, PBF_Q, h);
    h = 2 * PBF_Q + pbf_muldiv( x, PBF_Q, h);
    h = 5 * PBF_Q + pbf_muldiv(-x, PBF_Q, h);
    h = 2 * PBF_Q + pbf_muldiv( x, PBF_Q, h);
    h = 3 * PBF_Q + pbf_muldiv(-x, PBF_Q, h);
    h = 2 * PBF_Q + pbf_muldiv( x, PBF_Q, h);
    h = 1 * PBF_Q + pbf_muldiv(-x, PBF_Q, h);
    return pbf_muldiv(x, PBF_Q, h);
}

// exp(x/Q) * Q with ln2 range reduction. x in Q-format.
int pbf_exp_cf(int x) {
    if (x == 0) return PBF_Q;
    int k = pbf_kdiv(x, PBF_LN2);
    int r = x - k * PBF_LN2;
    int er = PBF_Q + pbf_expm1_cf(r);
    if (k >= 0) {
        if (k >= 16) return PBF_Q * 16384;          // saturate
        // shift left by k (multiply by 2^k); check headroom
        for (int i = 0; i < 16; i++) { if (i >= k) break; er = er * 2; }
        return er;
    }
    int nk = -k;
    if (nk >= 31) return 0;
    for (int i = 0; i < 31; i++) { if (i >= nk) break; er = er / 2; }
    return er;
}

// ln(1 + exp(d/Q)) * Q — softplus.
int pbf_softplus_cf(int d) {
    if (d >  10 * PBF_Q) return d;
    if (d < -10 * PBF_Q) return pbf_exp_cf(d);
    if (d > 0) {
        int e = pbf_exp_cf(-d);
        return d + pbf_ln1p_cf(e);
    }
    int e = pbf_exp_cf(d);
    return pbf_ln1p_cf(e);
}

// ln(1 - exp(d/Q)) * Q — softminus, d < 0.
int pbf_softminus_cf(int d) {
    if (d >= 0)          return -100 * PBF_Q;
    if (d < -10 * PBF_Q) return -pbf_exp_cf(d);
    int e = pbf_exp_cf(d);
    return pbf_ln1p_cf(-e);
}

// Encode: float input at the pixel boundary; everything inside the iteration
// is int. The float→int conversion via log() happens once per pixel (for the
// c constant), not inside the loop.
int pbf_encode(float v) {
    if (v == 0.0) return 0;
    float mag = abs(v);
    int level;
    if (u_format_kind == 1) {
        // Tapered: convert log to Q13, then to position, then to magnitude code.
        int log_q13 = int(floor(log(mag) * float(PBF_Q) + 0.5));
        int p = u_unity_pos + pbf_kdiv(log_q13, u_base_step_log_q13);
        level = pbft_pos_to_mag(p);
    } else {
        if (mag < u_vmin) mag = u_vmin;
        level = int(floor(log(mag / u_vmin) / u_ln_per_level + 0.5));
        if (level < 0) level = 0;
        if (level > PBF_LEVELS - 1) level = PBF_LEVELS - 1;
    }
    return (v > 0.0) ? (PBF_MID + level) : (PBF_MID - 1 - level);
}

// Decode: float output for the post-iteration colour computation. Inside the
// iteration we use pure-int compares and never call this.
float pbf_decode(int code) {
    if (code == 0)       return 0.0;
    if (code == PBF_MAX) return 1e30;
    float s;
    int lvl;
    if (code >= PBF_MID) { s =  1.0; lvl = code - PBF_MID; }
    else                 { s = -1.0; lvl = PBF_MID - 1 - code; }
    if (u_format_kind == 1) {
        int p = pbft_mag_to_pos(lvl);
        int log_q13 = (p - u_unity_pos) * u_base_step_log_q13;
        return s * exp(float(log_q13) / float(PBF_Q));
    }
    return s * u_vmin * exp(float(lvl) * u_ln_per_level);
}

// Multiplication: pure integer adds on magnitude levels (flat) or on
// tapered positions. Both paths are int-only.
int pbf_mul(int a, int b) {
    if (a == 0 || b == 0) return 0;
    if (a == PBF_MAX || b == PBF_MAX) return PBF_MAX;
    int an = (a < PBF_MID) ? 1 : 0;
    int bn = (b < PBF_MID) ? 1 : 0;
    int am = (an == 1) ? (PBF_MID - 1 - a) : (a - PBF_MID);
    int bm = (bn == 1) ? (PBF_MID - 1 - b) : (b - PBF_MID);
    int cm;
    if (u_format_kind == 1) {
        cm = pbft_pos_to_mag(pbft_mag_to_pos(am) + pbft_mag_to_pos(bm) - u_unity_pos);
    } else {
        cm = am + bm + u_offset;
        if (cm < 0)           return 0;
        if (cm >= PBF_LEVELS) return PBF_MAX;
    }
    int cn = an + bn - 2 * an * bn;  // XOR on 0/1
    return (cn == 1) ? (PBF_MID - 1 - cm) : (PBF_MID + cm);
}

int pbf_div(int a, int b) {
    if (a == 0) return 0;
    if (b == 0 || a == PBF_MAX) return PBF_MAX;
    if (b == PBF_MAX) return 0;
    int an = (a < PBF_MID) ? 1 : 0;
    int bn = (b < PBF_MID) ? 1 : 0;
    int am = (an == 1) ? (PBF_MID - 1 - a) : (a - PBF_MID);
    int bm = (bn == 1) ? (PBF_MID - 1 - b) : (b - PBF_MID);
    int cm;
    if (u_format_kind == 1) {
        cm = pbft_pos_to_mag(pbft_mag_to_pos(am) - pbft_mag_to_pos(bm) + u_unity_pos);
    } else {
        cm = am - bm - u_offset;
        if (cm < 0)           return 0;
        if (cm >= PBF_LEVELS) return PBF_MAX;
    }
    int cn = an + bn - 2 * an * bn;
    return (cn == 1) ? (PBF_MID - 1 - cm) : (PBF_MID + cm);
}

// Addition: integer Q13 softplus / softminus CF on both flat and tapered
// paths. The "log step per coordinate unit" uniform converts position
// differences into the d the CF expects, and back into coordinate units
// after the correction. No floats in the path.
//
// Coordinates: flat path uses magnitude code levels directly; tapered path
// uses the per-taper position scheme from pbft_mag_to_pos.
int pbf_add(int a, int b) {
    if (a == 0) return b;
    if (b == 0) return a;
    if (a == PBF_MAX || b == PBF_MAX) return PBF_MAX;
    int an = (a < PBF_MID) ? 1 : 0;
    int bn = (b < PBF_MID) ? 1 : 0;
    int am = (an == 1) ? (PBF_MID - 1 - a) : (a - PBF_MID);
    int bm = (bn == 1) ? (PBF_MID - 1 - b) : (b - PBF_MID);

    // Coordinate (level for flat, position for tapered) and its Q13 step.
    int ca = (u_format_kind == 1) ? pbft_mag_to_pos(am) : am;
    int cb = (u_format_kind == 1) ? pbft_mag_to_pos(bm) : bm;
    int step_q13 = u_base_step_log_q13;

    int hi, lo, cn;
    if (an == bn) {
        if (ca >= cb) { hi = ca; lo = cb; }
        else          { hi = cb; lo = ca; }
        cn = an;
    } else {
        if (ca == cb) return 0;
        if (ca >  cb) { hi = ca; lo = cb; cn = an; }
        else          { hi = cb; lo = ca; cn = bn; }
    }

    int d_q13   = (lo - hi) * step_q13;          // <= 0
    int corr_q13 = (an == bn) ? pbf_softplus_cf(d_q13)
                              : pbf_softminus_cf(d_q13);
    int corr    = pbf_kdiv(corr_q13, step_q13);
    int cc      = hi + corr;

    int cm;
    if (u_format_kind == 1) {
        cm = pbft_pos_to_mag(cc);
    } else {
        cm = cc;
        if (cm < 0)           cm = 0;
        if (cm >= PBF_LEVELS) cm = PBF_LEVELS - 1;
    }
    return (cn == 1) ? (PBF_MID - 1 - cm) : (PBF_MID + cm);
}

int pbf_sub(int a, int b) { return pbf_add(a, pbf_neg(b)); }

// ── Complex helpers (ivec2 = (re_code, im_code)) ────────────────────────────

ivec2 pbfc_encode(float re, float im) {
    return ivec2(pbf_encode(re), pbf_encode(im));
}

vec2 pbfc_decode(ivec2 z) {
    return vec2(pbf_decode(z.x), pbf_decode(z.y));
}

// (a + bi)^2 = (a^2 - b^2) + 2ab·i
ivec2 pbfc_sqr(ivec2 z) {
    int r2 = pbf_mul(z.x, z.x);
    int i2 = pbf_mul(z.y, z.y);
    int ri = pbf_mul(u_pbf_two, pbf_mul(z.x, z.y));
    return ivec2(pbf_sub(r2, i2), ri);
}

ivec2 pbfc_sqr_add(ivec2 z, ivec2 c) {
    ivec2 z2 = pbfc_sqr(z);
    return ivec2(pbf_add(z2.x, c.x), pbf_add(z2.y, c.y));
}

ivec2 pbfc_burning(ivec2 z, ivec2 c) {
    return pbfc_sqr_add(ivec2(pbf_abs(z.x), pbf_abs(z.y)), c);
}

// Complex addition / subtraction (element-wise)
ivec2 pbfc_add(ivec2 a, ivec2 b) { return ivec2(pbf_add(a.x, b.x), pbf_add(a.y, b.y)); }
ivec2 pbfc_sub(ivec2 a, ivec2 b) { return ivec2(pbf_sub(a.x, b.x), pbf_sub(a.y, b.y)); }

// Complex multiplication: (a+bi)(c+di) = (ac-bd) + (ad+bc)i
ivec2 pbfc_mul(ivec2 a, ivec2 b) {
    return ivec2(pbf_sub(pbf_mul(a.x, b.x), pbf_mul(a.y, b.y)),
                 pbf_add(pbf_mul(a.x, b.y), pbf_mul(a.y, b.x)));
}

// Complex division: (a+bi)/(c+di) = ((ac+bd) + (bc-ad)i) / (c²+d²)
ivec2 pbfc_div(ivec2 a, ivec2 b) {
    int denom = pbf_add(pbf_mul(b.x, b.x), pbf_mul(b.y, b.y));
    int nr = pbf_add(pbf_mul(a.x, b.x), pbf_mul(a.y, b.y));
    int ni = pbf_sub(pbf_mul(a.y, b.x), pbf_mul(a.x, b.y));
    return ivec2(pbf_div(nr, denom), pbf_div(ni, denom));
}

// |z|^2 via float decode, for escape test
float pbfc_abs2(ivec2 z) {
    vec2 zf = pbfc_decode(z);
    return dot(zf, zf);
}
`;

      ${palGLSL(pal)}
      void main() {
        vec2 uv = (gl_FragCoord.xy / u_res - 0.5) * vec2(u_res.x/u_res.y, 1.0);
        float re = u_center.x + uv.x * u_scale;
        float im = u_center.y + uv.y * u_scale;
        ivec2 c = pbfc_encode(re, im);
        ivec2 z = c;
        float n = 0.0;
        float orbit = 0.0;
        for (int i = 0; i < 1024; i++) {
          if (i >= u_iter) break;
          float r2 = pbfc_abs2(z);
          orbit += r2;
          if (r2 > 64.0) { n = float(i); break; }
          // Circle inversion: z → z / |z|²  when |z|>1
          if (r2 > 1.0) {
            int r2_pbf = pbf_add(pbf_mul(z.x, z.x), pbf_mul(z.y, z.y));
            z = ivec2(pbf_div(z.x, r2_pbf), pbf_div(z.y, r2_pbf));
          }
          z = pbfc_sqr_add(z, c);
          n = float(i+1);
        }
        if (n >= float(u_iter)) {
          float t = mod(orbit * 0.01, 1.0);
          gl_FragColor = vec4(palette(t) * 0.15, 1.0);
          return;
        }
        float t = n / float(u_iter) + 0.5*sin(orbit*0.1);
        gl_FragColor = vec4(palette(fract(t)), 1.0);
      }
    `
  },
];

// ══════════════════════════════════════════════════════════════════════════════
// PALETTES
// ══════════════════════════════════════════════════════════════════════════════

const PALETTES = [
  { name: 'acid',    css: 'linear-gradient(90deg,#080808,#e8ff3c,#ff3c6e)',
    glsl: `vec3 palette(float t){return vec3(0.5+0.5*cos(6.28*(t+0.0)),0.5+0.5*cos(6.28*(t+0.33)),0.5+0.5*cos(6.28*(t-0.1)));}` },
  { name: 'ocean',   css: 'linear-gradient(90deg,#000510,#0a4a6e,#7cffcb)',
    glsl: `vec3 palette(float t){return vec3(0.1+0.5*t,0.3+0.4*sin(3.14*t),0.5+0.5*cos(3.14*t));}` },
  { name: 'ember',   css: 'linear-gradient(90deg,#0a0000,#8b1a00,#ffaa00)',
    glsl: `vec3 palette(float t){return vec3(0.5+0.5*cos(6.28*(t*0.7)),0.2+0.3*cos(6.28*(t*0.9+0.4)),0.05*cos(6.28*t));}` },
  { name: 'mono',    css: 'linear-gradient(90deg,#000,#888,#fff)',
    glsl: `vec3 palette(float t){float v=pow(t,0.5);return vec3(v);}` },
];

function palGLSL(palIdx) { return PALETTES[palIdx].glsl; }

// ══════════════════════════════════════════════════════════════════════════════
// WEBGL ENGINE
// ══════════════════════════════════════════════════════════════════════════════

const VS = `
  attribute vec2 a_pos;
  void main() { gl_Position = vec4(a_pos, 0, 1); }
`;

class FractalGL {
  constructor(canvas) {
    this.canvas = canvas;
    this.gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
    const gl = this.gl;
    // Full-screen quad
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER,
      new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    this.buf = buf;
    this.programs = {};
    this.currentProg = null;
  }

  compile(fractalId, fragSrc) {
    const gl = this.gl;
    const key = fractalId;
    if (this.programs[key]) {
      gl.deleteProgram(this.programs[key]);
    }
    const vs = this._shader(gl.VERTEX_SHADER, VS);
    const fs = this._shader(gl.FRAGMENT_SHADER,
      `precision highp float;\nprecision highp int;\n` + fragSrc);
    if (!vs || !fs) return false;
    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      console.error(gl.getProgramInfoLog(prog));
      return false;
    }
    this.programs[key] = prog;
    return true;
  }

  _shader(type, src) {
    const gl = this.gl;
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      const log = gl.getShaderInfoLog(s) || '(empty info log)';
      const kind = (type === gl.VERTEX_SHADER) ? 'VERTEX' : 'FRAGMENT';
      const numbered = src.split('\n').map((l, i) => String(i+1).padStart(4, ' ') + ': ' + l).join('\n');
      // Dump full source into a <pre> on the page so it's not truncated.
      const pre = document.createElement('pre');
      pre.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:#000;color:#0f0;font:11px monospace;padding:10px;overflow:auto;z-index:9999;white-space:pre;';
      pre.textContent = `${kind} SHADER COMPILE FAILED\n--- log ---\n${log}\n--- source ---\n${numbered}`;
      document.body.appendChild(pre);
      console.error(`${kind} shader failed (see overlay)`);
      return null;
    }
    return s;
  }

  render(fractalId, cx, cy, scale, iter, julia, t0) {
    const gl = this.gl;
    const prog = this.programs[fractalId];
    if (!prog) return;
    gl.useProgram(prog);
    gl.bindBuffer(gl.ARRAY_BUFFER, this.buf);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    const set = (n, ...v) => {
      const l = gl.getUniformLocation(prog, n);
      if (!l) return;
      if (v.length === 1) gl.uniform1f(l, v[0]);
      else if (v.length === 2) gl.uniform2f(l, v[0], v[1]);
      else gl.uniform1i(l, v[0]);
    };
    const setI = (n, v) => {
      const l = gl.getUniformLocation(prog, n);
      if (l) gl.uniform1i(l, v);
    };

    const setIv = (n, arr) => {
      const l = gl.getUniformLocation(prog, n);
      if (l) gl.uniform1iv(l, arr);
    };

    set('u_center', cx, cy);
    set('u_scale', scale);
    set('u_res', this.canvas.width, this.canvas.height);
    setI('u_iter', iter);
    if (julia) set('u_julia', julia[0], julia[1]);

    // Flat-format uniforms (ignored when tapered, but cheap to push).
    set('u_ln_per_level', currentFormat.ln_per_level);
    set('u_vmin', currentFormat.v_min);
    setI('u_offset', currentFormat.offset);

    // Encoded constants (each format encodes them differently).
    setI('u_pbf_one',   currentFormat.pbf_one);
    setI('u_pbf_two',   currentFormat.pbf_two);
    setI('u_pbf_three', currentFormat.pbf_three);

    // Format dispatch + Q13 step (used by the int CF for sb/db).
    setI('u_format_kind',       currentFormat.is_taper ? 1 : 0);
    setI('u_base_step_log_q13', currentFormat.base_step_log_q13);

    setI('PBF_MID',    currentFormat.mid);
    setI('PBF_MAX',    currentFormat.max_code);
    setI('PBF_LEVELS', currentFormat.n_levels);

    if (currentFormat.is_taper) {
      setIv('u_taper_mag_end',   currentFormat.taper_mag_end);
      setIv('u_taper_pos_end',   currentFormat.taper_pos_end);
      setIv('u_taper_pos_start', currentFormat.taper_pos_start);
      setIv('u_taper_step',      currentFormat.taper_step);
      setI('u_unity_pos',        currentFormat.unity_pos);
      setI('u_max_pos',          currentFormat.max_pos);
    }

    gl.viewport(0, 0, this.canvas.width, this.canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════════════════════════════════

let fractalIdx = FRACTALS.findIndex(f => f.id === 'log_mirror');
if (fractalIdx < 0) fractalIdx = 0;
let palIdx = 0;
let cx, cy, scale;
let iter = 256;
let juliaRe = -0.7269, juliaIm = 0.1889;
let renderer;
let renderPending = false;
let shaderBuilt = {};

function currentFractal() { return FRACTALS[fractalIdx]; }

function buildShader(idx, pal) {
  const f = FRACTALS[idx];
  const key = `${idx}_${pal}`;
  if (shaderBuilt[key]) return true;
  const ok = renderer.compile(key, f.frag(pal));
  if (ok) shaderBuilt[key] = true;
  return ok;
}

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(doRender);
}

function doRender() {
  renderPending = false;
  const f = currentFractal();
  const key = `${fractalIdx}_${palIdx}`;
  buildShader(fractalIdx, palIdx);

  const badge = document.getElementById('renderBadge');
  badge.textContent = 'RENDERING';
  badge.classList.add('rendering');

  const t0 = performance.now();
  renderer.render(key, cx, cy, scale, iter,
    f.hasJulia ? [juliaRe, juliaIm] : null);
  const ms = (performance.now() - t0).toFixed(1);

  badge.textContent = `${ms}ms`;
  badge.classList.remove('rendering');

  document.getElementById('statMs').textContent = ms + 'ms';
  document.getElementById('statZoom').textContent =
    (currentFractal().scale / scale).toExponential(2) + '×';
  document.getElementById('cZoom').textContent =
    (currentFractal().scale / scale).toExponential(2) + '×';
}

function resetView() {
  const f = currentFractal();
  cx = f.cx; cy = f.cy; scale = f.scale;
  scheduleRender();
}

function resize() {
  const wrap = document.getElementById('canvasWrap');
  const c = document.getElementById('gl');
  c.width = wrap.clientWidth;
  c.height = wrap.clientHeight;
  document.getElementById('statRes').textContent = `${c.width}×${c.height}`;
  scheduleRender();
}

// ── tabs ──
function buildTabs() {
  const el = document.getElementById('tabs');
  FRACTALS.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === fractalIdx ? ' active' : '');
    btn.textContent = f.name;
    btn.onclick = () => {
      fractalIdx = i;
      document.querySelectorAll('.tab').forEach((t,j) =>
        t.classList.toggle('active', j === i));
      document.getElementById('juliaControls').style.display =
        f.hasJulia ? 'block' : 'none';
      document.getElementById('fractalDesc').innerHTML = f.desc;
      resetView();
    };
    el.appendChild(btn);
  });
}

// ── palettes ──
function buildPalettes() {
  const el = document.getElementById('palettes');
  PALETTES.forEach((p, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = p.css;
    s.title = p.name;
    s.onclick = () => {
      palIdx = i;
      document.querySelectorAll('.swatch').forEach((sw,j) =>
        sw.classList.toggle('active', j === i));
      shaderBuilt = {};  // force recompile with new palette
      scheduleRender();
    };
    el.appendChild(s);
  });
}

// ── mouse navigation ──
function setupMouse() {
  const wrap = document.getElementById('canvasWrap');
  let dragging = false, drag0 = null, dragCx, dragCy;

  wrap.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    drag0 = { x: e.clientX, y: e.clientY };
    dragCx = cx; dragCy = cy;
  });

  wrap.addEventListener('mousemove', e => {
    const rect = wrap.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    const py = (e.clientY - rect.top) / rect.height;
    const aspect = rect.width / rect.height;
    const mRe = cx + (px - 0.5) * scale * aspect;
    const mIm = cy + (py - 0.5) * -scale;
    document.getElementById('cRe').textContent = mRe.toFixed(6);
    document.getElementById('cIm').textContent = mIm.toFixed(6);

    if (dragging && drag0) {
      const dx = (e.clientX - drag0.x) / rect.width  * scale * aspect;
      const dy = (e.clientY - drag0.y) / rect.height * scale;
      cx = dragCx - dx;
      cy = dragCy + dy;
      scheduleRender();
    }
  });

  wrap.addEventListener('mouseup',   () => { dragging = false; drag0 = null; });
  wrap.addEventListener('mouseleave',() => { dragging = false; drag0 = null; });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width - 0.5;
    const py = (e.clientY - rect.top)  / rect.height - 0.5;
    const aspect = rect.width / rect.height;
    const factor = e.deltaY > 0 ? 1.25 : 0.8;
    // zoom toward cursor
    cx += px * scale * aspect * (1 - factor);
    cy -= py * scale        * (1 - factor);
    scale *= factor;
    scheduleRender();
  }, { passive: false });

  // Touch pinch-zoom
  let lastDist = 0;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
    }
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const d = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY);
      scale *= lastDist / d;
      lastDist = d;
      scheduleRender();
    }
  }, { passive: true });
}

// ── controls ──
function setupControls() {
  const iterSlider = document.getElementById('iterSlider');
  iterSlider.addEventListener('input', () => {
    iter = parseInt(iterSlider.value);
    document.getElementById('iterVal').textContent = iter;
    scheduleRender();
  });

  document.getElementById('btnReset').onclick = resetView;
  document.getElementById('btnZoomIn').onclick  = () => { scale /= 2; scheduleRender(); };
  document.getElementById('btnZoomOut').onclick = () => { scale *= 2; scheduleRender(); };

  const jRe = document.getElementById('juliaRe');
  const jIm = document.getElementById('juliaIm');
  const applyJulia = () => {
    juliaRe = parseFloat(jRe.value) || 0;
    juliaIm = parseFloat(jIm.value) || 0;
    scheduleRender();
  };
  jRe.addEventListener('change', applyJulia);
  jIm.addEventListener('change', applyJulia);

  document.getElementById('juliaRand').onclick = () => {
    juliaRe = (Math.random() * 3 - 1.5).toFixed(4) * 1;
    juliaIm = (Math.random() * 3 - 1.5).toFixed(4) * 1;
    jRe.value = juliaRe;
    jIm.value = juliaIm;
    scheduleRender();
  };

  const FORMATS = { pbf8: PBF8, pbf16: PBF16, tap8: TAP8, tap16: TAP16 };
  const FORMAT_LABELS = {
    pbf8:  'PBF8 — int mul/div, int Q13 CF for sb/db',
    pbf16: 'PBF16 — int mul/div, int Q13 CF for sb/db',
    tap8:  'Tapered PBF8 — int position mul/div, int CF for sb/db',
    tap16: 'Tapered PBF16 — int position mul/div, int CF for sb/db',
  };
  document.querySelectorAll('.format-btn').forEach(b => {
    b.onclick = () => {
      const fmt = b.dataset.fmt;
      currentFormat = FORMATS[fmt];
      document.querySelectorAll('.format-btn').forEach(x =>
        x.classList.toggle('active', x === b));
      document.getElementById('formatBadge').innerHTML =
        `arithmetic: <strong>${FORMAT_LABELS[fmt]}</strong>`;
      scheduleRender();
    };
  });
}

// ── init ──
window.addEventListener('load', () => {
  renderer = new FractalGL(document.getElementById('gl'));
  buildTabs();
  buildPalettes();
  setupMouse();
  setupControls();

  const f = currentFractal();
  document.getElementById('fractalDesc').innerHTML = f.desc;
  document.getElementById('juliaControls').style.display =
    f.hasJulia ? 'block' : 'none';
  cx = f.cx; cy = f.cy; scale = f.scale;

  window.addEventListener('resize', () => { resize(); });
  resize();
});
</script>
